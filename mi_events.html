<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lake Michigan Weekend Events Map - June 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #0f172a;
            --bg-card-hover: #172033;
            --bg-header: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --bg-legend: rgba(15, 23, 42, 0.92);
            --bg-popup: #1e293b;
            --bg-filter: transparent;
            --bg-filter-hover: rgba(59, 130, 246, 0.12);
            --bg-filter-active: #3b82f6;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-heading: #f1f5f9;
            --text-time: #60a5fa;
            --text-gradient-1: #60a5fa;
            --text-gradient-2: #a78bfa;
            --border-color: #334155;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --marker-shadow: rgba(0, 0, 0, 0.4);
            --marker-border: #fff;
            --tag-outdoor-bg: #065f46; --tag-outdoor-fg: #6ee7b7;
            --tag-festival-bg: #7c2d12; --tag-festival-fg: #fdba74;
            --tag-library-bg: #1e3a5f; --tag-library-fg: #93c5fd;
            --tag-nature-bg: #064e3b; --tag-nature-fg: #86efac;
            --tag-educational-bg: #4c1d95; --tag-educational-fg: #c4b5fd;
            --tag-free-bg: #713f12; --tag-free-fg: #fde68a;
            --tag-starwars-bg: #7c2d12; --tag-starwars-fg: #fdba74;
            --tag-sport-bg: #1e3a5f; --tag-sport-fg: #67e8f9;
            --toggle-bg: #475569;
            --toggle-knob: #f1f5f9;
            --toggle-icon: "🌙";
            --scrollbar-track: #1e293b;
            --scrollbar-thumb: #475569;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-pill: 999px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-card-hover: #f1f5f9;
            --bg-header: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
            --bg-legend: rgba(255, 255, 255, 0.96);
            --bg-popup: #ffffff;
            --bg-filter: transparent;
            --bg-filter-hover: rgba(59, 130, 246, 0.08);
            --bg-filter-active: #3b82f6;
            --text-primary: #334155;
            --text-secondary: #64748b;
            --text-heading: #0f172a;
            --text-time: #2563eb;
            --text-gradient-1: #2563eb;
            --text-gradient-2: #7c3aed;
            --border-color: #e2e8f0;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.15);
            --marker-shadow: rgba(0, 0, 0, 0.12);
            --marker-border: #e2e8f0;
            --tag-outdoor-bg: #d1fae5; --tag-outdoor-fg: #065f46;
            --tag-festival-bg: #ffedd5; --tag-festival-fg: #9a3412;
            --tag-library-bg: #dbeafe; --tag-library-fg: #1e40af;
            --tag-nature-bg: #dcfce7; --tag-nature-fg: #166534;
            --tag-educational-bg: #ede9fe; --tag-educational-fg: #5b21b6;
            --tag-free-bg: #fef3c7; --tag-free-fg: #92400e;
            --tag-starwars-bg: #ffedd5; --tag-starwars-fg: #9a3412;
            --tag-sport-bg: #dbeafe; --tag-sport-fg: #0e7490;
            --toggle-bg: #cbd5e1;
            --toggle-knob: #ffffff;
            --scrollbar-track: #f1f5f9;
            --scrollbar-thumb: #cbd5e1;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.35s ease, color 0.35s ease;
            overflow: hidden;
            height: 100vh;
        }

        /* ====== HEADER ====== */
        #header {
            background: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            transition: background 0.35s ease, border-color 0.35s ease;
            z-index: 2000;
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0 10px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--text-gradient-1), var(--text-gradient-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .brand-text h1 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-heading);
            line-height: 1.2;
        }

        .brand-text .subtitle {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .count-badge {
            background: linear-gradient(135deg, var(--text-gradient-1), var(--text-gradient-2));
            color: #fff;
            padding: 5px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            white-space: nowrap;
        }

        /* ====== THEME TOGGLE ====== */
        #theme-toggle {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.15rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
            position: relative;
        }

        #theme-toggle:hover {
            border-color: var(--accent);
            background: var(--bg-filter-hover);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        #theme-toggle:active {
            transform: scale(0.94);
        }

        #theme-toggle .icon-sun,
        #theme-toggle .icon-moon {
            position: absolute;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }

        [data-theme="dark"] #theme-toggle .icon-sun { opacity: 0; transform: rotate(90deg) scale(0); }
        [data-theme="dark"] #theme-toggle .icon-moon { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] #theme-toggle .icon-sun { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="light"] #theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0); }

        /* ====== FILTER BAR ====== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 0 12px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-color);
            background: var(--bg-filter);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            user-select: none;
            -webkit-user-select: none;
        }

        .filter-btn .emoji {
            font-size: 0.9rem;
            line-height: 1;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            background: var(--bg-filter-hover);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--bg-filter-active);
            border-color: var(--bg-filter-active);
            color: #ffffff;
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .filter-btn:active {
            transform: scale(0.96);
        }

        /* ====== MAP CONTAINER ====== */
        #map-container {
            display: flex;
            height: calc(100vh - 140px);
            margin-bottom: 12px;
        }

        #map {
            flex: 1;
            min-height: 400px;
        }

        #sidebar {
            width: 360px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 16px 16px 60px 16px;
            transition: background 0.35s ease, border-color 0.35s ease;
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        #sidebar::-webkit-scrollbar {
            width: 5px;
        }

        #sidebar::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        /* ====== EVENT CARDS ====== */
        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .event-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: translateX(3px);
            box-shadow: var(--shadow-sm);
        }

        .event-card .event-title {
            font-weight: 600;
            font-size: 0.88rem;
            color: var(--text-heading);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .event-card .event-location {
            font-size: 0.78rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .event-card .event-time {
            font-size: 0.75rem;
            color: var(--text-time);
            margin-top: 3px;
        }

        .event-card .event-tag {
            display: inline-block;
            font-size: 0.62rem;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            margin-top: 6px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .tag-outdoor { background: var(--tag-outdoor-bg); color: var(--tag-outdoor-fg); }
        .tag-festival { background: var(--tag-festival-bg); color: var(--tag-festival-fg); }
        .tag-library { background: var(--tag-library-bg); color: var(--tag-library-fg); }
        .tag-nature { background: var(--tag-nature-bg); color: var(--tag-nature-fg); }
        .tag-educational { background: var(--tag-educational-bg); color: var(--tag-educational-fg); }
        .tag-free { background: var(--tag-free-bg); color: var(--tag-free-fg); }
        .tag-starwars { background: var(--tag-starwars-bg); color: var(--tag-starwars-fg); }
        .tag-sport { background: var(--tag-sport-bg); color: var(--tag-sport-fg); }


        /* ====== SITE FILTER ====== */
        .site-btn {
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-color);
            background: var(--bg-filter);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            user-select: none;
            -webkit-user-select: none;
        }

        .site-btn .emoji {
            font-size: 0.85rem;
            line-height: 1;
        }

        .site-btn:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.08);
            color: var(--text-primary);
        }

        .site-btn.active {
            background: #10b981;
            border-color: #10b981;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.3);
        }

        .site-btn:active {
            transform: scale(0.96);
        }

        /* ====== LEGEND ====== */

        .legend-control {
            padding-bottom: 4px;
        }

        .legend {
            background: var(--bg-legend);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            font-size: 0.72rem;
            color: var(--text-primary);
            transition: all 0.35s ease;
            box-shadow: var(--shadow-md);
            margin: 10px;
            z-index: 1000;
        }

        @media (min-width: 641px) {
            .legend {
                margin: 16px;
            }
        }

        .legend-title {
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-heading);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            margin: 3px 0;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 1.5px solid rgba(255,255,255,0.15);
        }

        /* ====== POPUP ====== */
        .leaflet-popup-content-wrapper {
            background: var(--bg-popup) !important;
            color: var(--text-primary) !important;
            border-radius: var(--radius) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-md) !important;
            transition: all 0.35s ease;
        }

        .leaflet-popup-tip {
            background: var(--bg-popup) !important;
            border: 1px solid var(--border-color) !important;
        }

        .leaflet-popup-content {
            margin: 12px 16px !important;
            font-family: 'Inter', 'Segoe UI', sans-serif !important;
        }

        .popup-title {
            font-weight: 700;
            font-size: 0.88rem;
            margin-bottom: 6px;
            color: var(--text-heading);
            line-height: 1.3;
        }

        .popup-detail {
            font-size: 0.78rem;
            color: var(--text-secondary);
            margin: 3px 0;
        }

        .popup-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            color: var(--accent);
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            padding: 4px 0;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .popup-link:hover {
            border-bottom-color: var(--accent);
        }


        /* ====== SEARCH + CALENDAR ====== */
        .sidebar-header {
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 8px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .calendar-input {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .calendar-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        /* Flatpickr theme overrides */
        .flatpickr-calendar {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-md) !important;
            border-radius: var(--radius) !important;
        }

        .flatpickr-day {
            color: var(--text-primary) !important;
        }

        .flatpickr-day:hover {
            background: var(--bg-filter-hover) !important;
        }

        .flatpickr-day.selected {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
        }

        .flatpickr-months .flatpickr-month {
            background: var(--bg-secondary) !important;
        }

        .flatpickr-current-month .flatpickr-monthDropdown-months,
        .flatpickr-current-month input.cur-year {
            color: var(--text-primary) !important;
        }

        .flatpickr-months .flatpickr-prev-month,
        .flatpickr-months .flatpickr-next-month {
            color: var(--text-primary) !important;
            fill: var(--text-primary) !important;
        }

        .flatpickr-day.today {
            border-color: var(--accent) !important;
        }

        .flatpickr-day.today:hover {
            background: var(--accent) !important;
        }

        span.flatpickr-weekday {
            color: var(--text-secondary) !important;
        }

        .flatpickr-day.inRange,
        .flatpickr-day.prevMonthDay.inRange,
        .flatpickr-day.nextMonthDay.inRange {
            background: var(--accent-glow) !important;
            border-color: transparent !important;
        }

        .flatpickr-day.startRange,
        .flatpickr-day.endRange {
            background: var(--accent) !important;
        }

        /* Event dot indicator on calendar days */
        .flatpickr-day.has-event::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
        }

        .flatpickr-day.has-event:hover::after {
            background: #fff !important;
        }

        /* ====== RESPONSIVE ====== */
        @media (max-width: 900px) {
            #header { padding: 0 16px; }
            .header-top { padding: 10px 0 8px; }
            .brand-text h1 { font-size: 1rem; }
            .brand-icon { width: 30px; height: 30px; font-size: 0.9rem; }
            #theme-toggle { width: 36px; height: 36px; font-size: 1rem; }
            .filter-btn { padding: 5px 10px; font-size: 0.72rem; }
            #sidebar { width: 300px; padding: 12px; }
        }

        @media (max-width: 640px) {
            #map-container { flex-direction: column; }
            #map { min-height: 45vh; flex: none; }
            #sidebar {
                width: 100%;
                flex: 1;
                border-left: none;
                border-top: 1px solid var(--border-color);
                padding: 12px;
            }
            .brand-icon { display: none; }
            .brand-text .subtitle { display: none; }
            .count-badge { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
    <!-- Flatpickr calendar -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
</head>
<body>
    <div id="header">
        <div class="header-top">
            <div class="brand">
                <div class="brand-icon">🗺️</div>
                <div class="brand-text">
                    <h1>Mid Michigan & Lake Michigan Events</h1>
                    <div class="subtitle">Kid-Friendly Events Across 7 Regions — June 2026</div>
                </div>
            </div>
            <div class="header-actions">
                <span class="count-badge" id="count"></span>
                <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle theme">
                    <span class="icon-moon">🌙</span>
                    <span class="icon-sun">☀️</span>
                </button>
            </div>
        </div>
        <div class="filter-bar" id="category-filters"></div>
        <div class="filter-bar">
            <button class="site-btn active" data-site="all"><span class="emoji">🌍</span>All Regions</button>
            <button class="site-btn" data-site="Detroit Metro"><span class="emoji">🏙️</span>Detroit Metro</button>
            <button class="site-btn" data-site="South Haven"><span class="emoji">🌊</span>South Haven</button>
            <button class="site-btn" data-site="Traverse City"><span class="emoji">🍒</span>Traverse City</button>
            <button class="site-btn" data-site="Grand Haven"><span class="emoji">🏖️</span>Grand Haven</button>
            <button class="site-btn" data-site="Mt. Pleasant"><span class="emoji">🏫</span>Mt. Pleasant</button>
            <button class="site-btn" data-site="Battle Creek"><span class="emoji">🌽</span>Battle Creek</button>
            <button class="site-btn" data-site="Grand Rapids"><span class="emoji">🌷</span>Grand Rapids</button>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
        <div id="sidebar">
            <div class="sidebar-header">
                <input type="text" class="search-input" id="search-input" placeholder="Search events, locations, dates...">
                <input type="text" class="calendar-input" id="calendar-input" placeholder="Select date or date range">
            </div>
            <div id="event-list"></div>
        </div>

    // Date parser — handles "May 7, 2026", "May 7", "07 MAY", "MAY 7"
    function parseDate(dateStr) {
        const months = {
            'january': 0, 'jan': 0, 'february': 1, 'feb': 1, 'march': 2, 'mar': 2,
            'april': 3, 'apr': 3, 'may': 4, 'june': 5, 'jun': 5,
            'july': 6, 'jul': 6, 'august': 7, 'aug': 7,
            'september': 8, 'sep': 8, 'october': 9, 'oct': 9,
            'november': 10, 'nov': 10, 'december': 11, 'dec': 11
        };
        const year = calendarYear; // from page subtitle, fallback set below
        const weekdays = {
            'sunday': 0, 'monday': 1, 'tuesday': 2, 'wednesday': 3,
            'thursday': 4, 'friday': 5, 'saturday': 6
        };
        // "May 7, 2026"
        let match = dateStr.match(/(\w+)\s+(\d+),?\s*(\d{4})/);
        if (match) return new Date(parseInt(match[3]), months[match[1].toLowerCase()], parseInt(match[2]));
        // "May 7"
        match = dateStr.match(/(\w+)\s+(\d+)/);
        if (match && match[1].toLowerCase() in months) return new Date(year, months[match[1].toLowerCase()], parseInt(match[2]));
        // "07 MAY"
        match = dateStr.match(/(\d+)\s+(\w+)/);
        if (match && match[2].toLowerCase() in months) return new Date(year, months[match[2].toLowerCase()], parseInt(match[1]));
        return null;
    }

    // Recurring date parser — returns { type, weekdays?, dates?, until? }
    function parseRecurring(dateStr) {
        const lower = dateStr.toLowerCase();
        // "Recurring weekly on Sunday, Thursday" or "Recurring weekly on Thursday"
        let match = lower.match(/weekly\s+on\s+([\w\s,]+)/);
        if (match) {
            const weekdays = match[1].split(',').map(w => w.trim());
            return { type: 'weekly', weekdays };
        }
        // "Recurring daily until May 10, 2026"
        match = lower.match(/daily\s+until\s+(.+)/);
        if (match) {
            const until = parseDate(match[1].trim());
            if (until) return { type: 'daily', until };
        }
        // "Dates vary between May 6, 2026 - May 9, 2026"
        match = lower.match(/(?:between|from)\s+(.+?)\s*[-–]\s*(.+)/);
        if (match) {
            const start = parseDate(match[1].trim());
            const end = parseDate(match[2].trim());
            if (start && end) return { type: 'range', start, end };
        }
        return null;
    }

    // Generate calendar dates for a recurring event within a given month/year
    function datesForRecurringInMonth(recurring, year, month) {
        const dates = new Set();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        if (recurring.type === 'weekly') {
            const weekdayMap = {
                'sunday': 0, 'monday': 1, 'tuesday': 2, 'wednesday': 3,
                'thursday': 4, 'friday': 5, 'saturday': 6
            };
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                if (recurring.weekdays.some(w => weekdayMap[w] === d.getDay())) {
                    const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    dates.add(key);
                }
            }
        } else if (recurring.type === 'daily') {
            const until = recurring.until;
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                if (d <= until) {
                    const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    dates.add(key);
                }
            }
        } else if (recurring.type === 'range') {
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                if (d >= recurring.start && d <= recurring.end) {
                    const key = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    dates.add(key);
                }
            }
        }
        return dates;
    }

    // Check if a recurring event is active on a given Date
    function recurringActiveOn(recurring, date) {
        const weekdayMap = {
            'sunday': 0, 'monday': 1, 'tuesday': 2, 'wednesday': 3,
            'thursday': 4, 'friday': 5, 'saturday': 6
        };
        if (recurring.type === 'weekly') {
            return recurring.weekdays.some(w => weekdayMap[w] === date.getDay());
        } else if (recurring.type === 'daily') {
            return date <= recurring.until;
        } else if (recurring.type === 'range') {
            return date >= recurring.start && date <= recurring.end;
        }
        return false;
    }

                const sm = selectedDate.getMonth();
                const sday = selectedDate.getDate();
                let dateMatch = false;
                // Check fixed date
                if (event._date) {
                    if (event._date.getFullYear() === sd && event._date.getMonth() === sm && event._date.getDate() === sday) {
                        dateMatch = true;
                    }
                }
                // Check recurring
                if (!dateMatch && event._recurring) {
                    const checkDate = new Date(sd, sm, sday);
                    if (recurringActiveOn(event._recurring, checkDate)) {
                        dateMatch = true;
                    }
                }
                if (!dateMatch) {
                    show = false;
                }
            }

            if (show) {
                marker.addTo(map);
            } else {
                map.removeLayer(marker);
            }
        });

        // Update sidebar cards
        document.querySelectorAll('.event-card').forEach(card => {
            let show = true;
            if (activeFilter !== 'all' && card.dataset.category !== activeFilter) show = false;
            if (activeSite !== 'all' && card.dataset.site !== activeSite) show = false;
            
            if (query) {
                const text = card.textContent.toLowerCase();
                if (!text.includes(query)) show = false;
            }
            
            if (selectedDate) {
                const sd = selectedDate.getFullYear();
                const sm = selectedDate.getMonth();
                const sday = selectedDate.getDate();
                const eventDate = parseDate(card.dataset.eventDate);
                let dateMatch = false;
                // Check fixed date
                if (eventDate) {
                    if (eventDate.getFullYear() === sd && eventDate.getMonth() === sm && eventDate.getDate() === sday) dateMatch = true;
                }
                // Check recurring
                if (!dateMatch) {
                    const recurring = parseRecurring(card.dataset.eventDate);
                    if (recurring) {
                        const checkDate = new Date(sd, sm, sday);
                        if (recurringActiveOn(recurring, checkDate)) dateMatch = true;
                    }
                }
                if (!dateMatch) show = false;
            }

            card.style.display = show ? 'block' : 'none';
        });

        // Update count
        const visible = markers.filter(({ event }) => {
            let show = true;
            if (activeFilter !== 'all' && event.category !== activeFilter) show = false;
            if (activeSite !== 'all' && event.site !== activeSite) show = false;
            if (query) {
                const searchable = `${event.title} ${event.location} ${event.category} ${event.date} ${event.site || ''}`.toLowerCase();
                if (!searchable.includes(query)) show = false;
            }
            if (selectedDate) {
                const eventDate = parseDate(event.date);
                if (eventDate) {
                    const sd = selectedDate.getFullYear();
                    const sm = selectedDate.getMonth();
                    const sday = selectedDate.getDate();
                    if (!(eventDate.getFullYear() === sd && eventDate.getMonth() === sm && eventDate.getDate() === sday)) show = false;
                }
            }
            return show;
        });
        
        const count = visible.length;
        document.getElementById('count').textContent = `${count} event${count !== 1 ? 's' : ''}`;

        // Update category filter counts dynamically
        document.querySelectorAll('#category-filters .filter-btn').forEach(btn => {
            const filter = btn.dataset.filter;
            const catCount = filter === 'all' ? count : visible.filter(({ event }) => event.category === filter).length;
            const countEl = btn.querySelector('.filter-count');
            if (countEl) countEl.textContent = `(${catCount})`;
        });

        if (count > 1) {
            const bounds = L.featureGroup(visible.map(m => m.marker)).getBounds();
            map.fitBounds(bounds.pad(0.1));
        }
    }

    // Dynamic legend based on actual event categories
    const legend = L.control({ position: 'bottomleft', className: 'legend-control' });
    legend.onAdd = function() {
        const div = L.DomUtil.create('div', 'legend');
        const catCounts = {};
        events.forEach(e => {
            catCounts[e.category] = (catCounts[e.category] || 0) + 1;
        });
        let html = '<div class="legend-title">Categories</div>';
        // Sort by count descending
        Object.entries(catCounts)
            .sort((a, b) => b[1] - a[1])
            .forEach(([cat, count]) => {
                const color = categoryColors[cat] || '#60a5fa';
                const label = categoryLabels[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
                html += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label} (${count})</div>`;
            });
        div.innerHTML = html;
        return div;
    };
    legend.addTo(map);
    </script>
</body>
</html>
